<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>汪汪队出击 - Wakfu Combat Logs Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3CB3A8;
            --primary-dark: #2A9D8F;
            --primary-light: #4ECDC4;
            --secondary-color: #8B2F5C;
            --secondary-dark: #6B1F3F;
            --accent-color: #4ECDC4;
            --accent-light: #6EDDD4;
            --primary-gradient: linear-gradient(135deg, #3CB3A8 0%, #2A9D8F 100%);
            --secondary-gradient: linear-gradient(135deg, #8B2F5C 0%, #6B1F3F 100%);
            --accent-gradient: linear-gradient(135deg, #4ECDC4 0%, #3CB3A8 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.2);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0d3d3a 0%, #1a5f5a 50%, #0d3d3a 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 80%, rgba(60, 179, 168, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 47, 92, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(78, 205, 196, 0.08) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--glass-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(135deg, #3CB3A8 0%, #2A9D8F 50%, #1a5f5a 100%);
            color: white;
            padding: 0 30px;
            height: 160px;
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }

        .header .logo {
            width: 240px;
            height: 240px;
            object-fit: contain;
            position: relative;
        }

        .header h1 {
            font-size: 3.675em;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            letter-spacing: 2px;
            font-family: 'STKaiti', 'KaiTi', serif;
        }

        .header .version {
            font-size: 0.95em;
            opacity: 0.9;
            position: relative;
            font-weight: 300;
        }

        .header .disclaimer {
            font-size: 0.85em;
            margin-top: 20px;
            opacity: 0.85;
            text-align: left;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            line-height: 1.6;
        }

        .main-content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 0;
            min-height: 600px;
        }

        .sidebar {
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            border-right: 1px solid rgba(0, 0, 0, 0.06);
            padding: 24px;
        }

        .upload-section {
            margin-bottom: 24px;
        }

        .upload-section h3 {
            margin-bottom: 16px;
            color: #1e293b;
            font-weight: 600;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-section h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .file-input-label {
            display: block;
            padding: 20px;
            background: white;
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-md);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            color: #64748b;
        }

        .file-input-label:hover {
            background: linear-gradient(135deg, rgba(247, 147, 30, 0.08) 0%, rgba(255, 111, 0, 0.08) 100%);
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .btn:disabled {
            background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn:disabled::before {
            display: none;
        }

        .combat-list {
            margin-top: 24px;
        }

        .combat-list h3 {
            margin-bottom: 12px;
            color: #1e293b;
            font-weight: 600;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .combat-list h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }

        .combat-item {
            padding: 14px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .combat-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: transparent;
            transition: var(--transition);
        }

        .combat-item:hover {
            background: linear-gradient(135deg, rgba(60, 179, 168, 0.1) 0%, rgba(42, 157, 143, 0.1) 100%);
            border-color: var(--primary-color);
            transform: translateX(4px);
        }

        .combat-item:hover::before {
            background: var(--primary-gradient);
        }

        .combat-item.active {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(60, 179, 168, 0.4);
        }

        .combat-item.active::before {
            background: white;
        }

        .combat-item .combat-id {
            font-weight: 600;
            font-size: 1.05em;
        }

        .combat-item .combat-info {
            font-size: 0.85em;
            margin-top: 6px;
            opacity: 0.75;
        }

        .content-area {
            padding: 24px;
            background: #ffffff;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 24px;
            gap: 4px;
        }

        .tab {
            padding: 14px 28px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            color: #64748b;
            transition: var(--transition);
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            position: relative;
        }

        .tab:hover {
            color: var(--primary-color);
            background: linear-gradient(135deg, rgba(247, 147, 30, 0.08) 0%, rgba(255, 111, 0, 0.08) 100%);
        }

        .tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            font-weight: 600;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-content.active {
            display: block;
        }

        .stats-grid {
            display: flex;
            flex-wrap: nowrap;
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
            opacity: 0;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card h4 {
            color: #64748b;
            margin-bottom: 8px;
            font-size: 1.1em;
            font-weight: 700;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 28px;
        }

        .player-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: var(--radius-md);
            padding: 28px;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .player-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary-gradient);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .player-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-md);
        }

        .player-card:hover::after {
            transform: scaleX(1);
        }

        .player-card.selected {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, rgba(60, 179, 168, 0.1) 0%, rgba(42, 157, 143, 0.1) 100%);
        }

        .player-card.selected::after {
            transform: scaleX(1);
        }

        .player-card .name {
            font-weight: 600;
            font-size: 1.5em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            color: #1e293b;
        }

        .player-card-icon {
            width: 50px;
            height: 50px;
            margin-right: 14px;
            border-radius: 10px;
            vertical-align: middle;
            object-fit: contain;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .player-card .breed {
            color: #64748b;
            font-size: 1em;
        }

        .player-card .damage {
            margin-top: 20px;
            font-size: 1.8em;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chart-container {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .chart-container h4 {
            margin-bottom: 18px;
            color: #1e293b;
            font-weight: 600;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-container h4::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }

        .element-fire { color: #ef4444; }
        .element-water { color: #06b6d4; }
        .element-air { color: #a855f7; }
        .element-earth { color: #22c55e; }
        .element-neutral { color: #6b7280; }

        .detail-section {
            display: none;
        }

        .detail-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .element-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .element-stat {
            padding: 18px;
            border-radius: var(--radius-md);
            text-align: center;
            transition: var(--transition);
        }

        .element-stat.fire { 
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%); 
            border: 2px solid #fecaca;
        }
        .element-stat.water { 
            background: linear-gradient(135deg, #ecfeff 0%, #cffafe 100%); 
            border: 2px solid #a5f3fc;
        }
        .element-stat.air { 
            background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%); 
            border: 2px solid #e9d5ff;
        }
        .element-stat.earth { 
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); 
            border: 2px solid #bbf7d0;
        }

        .element-stat:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .element-stat .label {
            font-size: 0.9em;
            color: #64748b;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .element-stat .value {
            font-size: 1.6em;
            font-weight: 700;
        }

        .element-stat.fire .value { color: #ef4444; }
        .element-stat.water .value { color: #06b6d4; }
        .element-stat.air .value { color: #a855f7; }
        .element-stat.earth .value { color: #22c55e; }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .data-table th {
            background: var(--primary-gradient);
            color: white;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .data-table tr {
            transition: var(--transition);
        }

        .data-table tbody tr:hover {
            background: linear-gradient(135deg, rgba(247, 147, 30, 0.08) 0%, rgba(255, 111, 0, 0.08) 100%);
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #64748b;
            font-size: 1.1em;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--primary-color);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes highlight-fade {
            0% {
                background: var(--primary-gradient);
                box-shadow: 0 4px 20px rgba(247, 147, 30, 0.5);
                transform: scale(1.02);
            }
            30% {
                background: var(--primary-gradient);
                box-shadow: 0 4px 20px rgba(247, 147, 30, 0.5);
                transform: scale(1);
            }
            100% {
                background: white;
                box-shadow: none;
                transform: scale(1);
            }
        }

        .combat-item.highlight {
            animation: highlight-fade 2.5s ease-out forwards;
        }

        .combat-item.highlight .combat-id,
        .combat-item.highlight .combat-info {
            color: white;
        }

        .combat-item.highlight.fade-out .combat-id,
        .combat-item.highlight.fade-out .combat-info {
            color: inherit;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
        }

        .empty-state h3 {
            margin-bottom: 12px;
            color: #64748b;
            font-weight: 600;
        }

        .empty-state p {
            font-size: 0.95em;
        }

        .position-canvas {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border-radius: var(--radius-md);
            margin-top: 24px;
        }

        #playerDamageChart {
            min-height: 350px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            }

            .element-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .stats-grid {
                flex-wrap: wrap;
            }

            .stat-card {
                min-width: calc(50% - 8px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.webp" alt="Logo" class="logo">
            <h1>汪汪队出击</h1>
            <div class="version">Wakfu Combat Logs Analysis v0.0.1</div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="upload-section">
                    <h3>上传日志文件</h3>

                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" multiple accept=".log,.log.1,.log.2,.log.3,.txt">
                        <label for="fileInput" class="file-input-label">
                            点击选择日志文件<br>
                            <small>支持 wakfu.log, wakfu.log.1 等</small>
                        </label>
                    </div>
                    <button class="btn" id="analyzeBtn" disabled>开始分析</button>
                </div>

                <div class="combat-list">
                    <h3>战斗列表</h3>
                    <div id="combatList">
                        <div class="empty-state">
                            <p>请上传日志文件</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="content-area">
                <div class="tabs">
                    <button class="tab active" data-tab="overview">总览</button>
                    <button class="tab" data-tab="players">玩家统计</button>
                    <button class="tab" data-tab="npcs">NPC统计</button>
                    <button class="tab" data-tab="details">详细数据</button>
                </div>

                <div id="overview" class="tab-content active">
                    <div class="empty-state" id="overviewEmpty">
                        <h3>暂无数据</h3>
                        <p>请上传日志文件并选择一场战斗</p>
                    </div>

                    <div id="overviewContent" style="display: none;">
                        <div class="stats-grid">
                            <div class="stat-card">
                                <h4>玩家总输出</h4>
                                <div class="value" id="playerTotalDamage">0</div>
                            </div>
                            <div class="stat-card">
                                <h4>玩家总承伤</h4>
                                <div class="value" id="playerTotalTaken">0</div>
                            </div>
                            <div class="stat-card">
                                <h4>玩家总治疗</h4>
                                <div class="value" id="playerTotalHeal">0</div>
                            </div>
                            <div class="stat-card">
                                <h4>NPC总输出</h4>
                                <div class="value" id="npcTotalDamage">0</div>
                            </div>
                        </div>

                        <div class="chart-container">
                            <h4>玩家伤害排行</h4>
                            <div id="playerDamageChart" style="width: 100%; height: 400px;"></div>
                        </div>
                    </div>
                </div>

                <div id="players" class="tab-content">
                    <div class="empty-state" id="playersEmpty">
                        <h3>暂无数据</h3>
                        <p>请选择一场战斗</p>
                    </div>

                    <div id="playersContent" style="display: none;">
                        <div class="player-grid" id="playerGrid"></div>
                    </div>
                </div>

                <div id="npcs" class="tab-content">
                    <div class="empty-state" id="npcsEmpty">
